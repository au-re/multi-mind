name: Deploy gateway to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "gateway/**"
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: multi-mind-gateway
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/multi-mind/gateway

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - run: docker build -f gateway/Dockerfile.gw -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest gateway

      - run: docker push ${{ env.IMAGE }} --all-tags

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --port=3000
            --allow-unauthenticated
          secrets: |
            OPENAI_API_KEY=OPENAI_API_KEY:latest
