name: Build gateway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker build -f gateway/Dockerfile.gw -t multi-mind-gateway:latest gateway

      - run: docker save multi-mind-gateway:latest -o gateway-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-image
          path: gateway-image.tar
          retention-days: 30
