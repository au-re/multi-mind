name: Build gateway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          docker build -f gateway/Dockerfile.gw -t ghcr.io/${{ github.repository_owner }}/multi-mind-gateway:latest gateway
          docker push ghcr.io/${{ github.repository_owner }}/multi-mind-gateway:latest
